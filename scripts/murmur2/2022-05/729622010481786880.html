                                    <h1></h1>
                    <p>5/21 💎</p><div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729622010481786880_0.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729622010481786880_0.jpg 75w, ../../media/729622010481786880_0.jpg 100w, ../../media/729622010481786880_0.jpg 250w, ../../media/729622010481786880_0.jpg 400w, ../../media/729622010481786880_0.jpg 500w, ../../media/729622010481786880_0.jpg 540w, ../../media/729622010481786880_0.jpg 640w, ../../media/729622010481786880_0.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div><p>そういえば、私も青春みたいなのが沢山あるなぁと思った。年齢は関係はなくて、その時々、それぞれの青春がある。大好きな音楽たちは、それを一瞬にして思い出させてくれる。</p><p>雨の匂い。湿った空気。夏の夜の風。夜街のネオン。自分ひとりじゃ抱えきれないほどの、懐かしくて愛おしい思い出たち。思いを馳せるたびに心がぎゅっとなる。</p><p>この先も、きっとそういう大切なものがあふれるように積み重なっていくんだなぁって思ったら、やっぱり今をしっかり大切にしなきゃって思ったんだ。</p><div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729622010481786880_1.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729622010481786880_1.jpg 75w, ../../media/729622010481786880_1.jpg 100w, ../../media/729622010481786880_1.jpg 250w, ../../media/729622010481786880_1.jpg 400w, ../../media/729622010481786880_1.jpg 500w, ../../media/729622010481786880_1.jpg 540w, ../../media/729622010481786880_1.jpg 640w, ../../media/729622010481786880_1.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div>
