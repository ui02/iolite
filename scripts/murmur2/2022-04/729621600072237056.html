                    <p>ガラスの森美術館</p><div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729621600072237056_0.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729621600072237056_0.jpg 75w, ../../media/729621600072237056_0.jpg 100w, ../../media/729621600072237056_0.jpg 250w, ../../media/729621600072237056_0.jpg 400w, ../../media/729621600072237056_0.jpg 500w, ../../media/729621600072237056_0.jpg 540w, ../../media/729621600072237056_0.jpg 640w, ../../media/729621600072237056_0.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div><p>建築物フェチにはたまらん場所だった❤️お土産屋さんの階段だらけの入り組んだ作りと、可愛い水車小屋がツボすぎて。住みつきたい…。オオデマリが咲いてるの見たかったな。</p><p>レストランでは馬頭琴の生演奏を聞きながら、霧の庭園を眺めて…とにかく癒やされた…🌿</p><div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729621600072237056_1.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729621600072237056_1.jpg 75w, ../../media/729621600072237056_1.jpg 100w, ../../media/729621600072237056_1.jpg 250w, ../../media/729621600072237056_1.jpg 400w, ../../media/729621600072237056_1.jpg 500w, ../../media/729621600072237056_1.jpg 540w, ../../media/729621600072237056_1.jpg 640w, ../../media/729621600072237056_1.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729621600072237056_2.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729621600072237056_2.jpg 75w, ../../media/729621600072237056_2.jpg 100w, ../../media/729621600072237056_2.jpg 250w, ../../media/729621600072237056_2.jpg 400w, ../../media/729621600072237056_2.jpg 500w, ../../media/729621600072237056_2.jpg 540w, ../../media/729621600072237056_2.jpg 640w, ../../media/729621600072237056_2.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div><div class="npf_row"><figure class="tmblr-full" data-orig-heig
