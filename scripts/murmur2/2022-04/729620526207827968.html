                                    <h1></h1>
                    <div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729620526207827968_0.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729620526207827968_0.jpg 75w, ../../media/729620526207827968_0.jpg 100w, ../../media/729620526207827968_0.jpg 250w, ../../media/729620526207827968_0.jpg 400w, ../../media/729620526207827968_0.jpg 500w, ../../media/729620526207827968_0.jpg 540w, ../../media/729620526207827968_0.jpg 640w, ../../media/729620526207827968_0.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div><p>本質を知ろうとすればするほど、嫌なことばかりでうんざりする。</p><p>本物なのかとか、良いとか悪いとか。判別する作業を延々と続けるよりも、もっと知見を広げることに費やそうと思った。</p><p>揺さぶられることなく、ニュートラルに。淡々としていなければ消耗するだけで、やっていけないなぁ。</p><p>自分事で捉える姿勢は大事だけど、ネガティブな方向に巻き込まれてはいけない。</p><p>そのうえで、自分のスタンスがどんなものなのかっていうのは、しっかりと考えておきたい。</p><div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729620526207827968_1.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729620526207827968_1.jpg 75w, ../../media/729620526207827968_1.jpg 100w, ../../media/729620526207827968_1.jpg 250w, ../../media/729620526207827968_1.jpg 400w, ../../media/729620526207827968_1.jpg 500w, ../../media/729620526207827968_1.jpg 540w, ../../media/729620526207827968_1.jpg 640w, ../../media/729620526207827968_1.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div>
