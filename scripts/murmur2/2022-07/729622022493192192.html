                                    <h1></h1>
                    <p>泣きべそかいた日比谷公園。</p><div class="npf_row"><figure class="tmblr-full" data-orig-height="1350" data-orig-width="1080"><img src="../../media/729622022493192192_0.jpg" data-orig-height="1350" data-orig-width="1080" srcset="../../media/729622022493192192_0.jpg 75w, ../../media/729622022493192192_0.jpg 100w, ../../media/729622022493192192_0.jpg 250w, ../../media/729622022493192192_0.jpg 400w, ../../media/729622022493192192_0.jpg 500w, ../../media/729622022493192192_0.jpg 540w, ../../media/729622022493192192_0.jpg 640w, ../../media/729622022493192192_0.jpg 1080w" sizes="(max-width: 1080px) 100vw, 1080px"/></figure></div><p>五月の終わりに祖母が亡くなり、無事に四十九日の法要も終えた。</p><p>その間、思うところや感じるものが本当に沢山あって、堪えることも多かった反面、幸福を感じることも多かった。</p><p>生まれてからずっと側にいた祖母の最期、人の一生の終りを目の当たりにしたら、そりゃ人生観も変わるなぁ。</p>
