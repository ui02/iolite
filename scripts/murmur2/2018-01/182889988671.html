                                    <h1>何もしない日</h1>
                    <figure data-orig-width="1024" data-orig-height="768" class="tmblr-full"><img src="../../media/182889988671_0.jpg" data-orig-width="1024" data-orig-height="768"/></figure><p>何もしない日があってもいい。すべてを投げ出す日があったっていい。つらいなら、たまには自分を甘やかそう…。</p>[[MORE]]<p>今日はサイト周辺をちょこちょこいじったり。おかげで、すてきなサイトを見つけられた。明日からまた頑張ろう。きっとすぐに週末だ。</p><p>ゆっくりできたので、少しは心に余裕がうまれた気がする。今までは何かしなきゃもったいないと思っていたけど、何もしないことで幸せになれたりもするんだね。</p><p>今日もお疲れ様でした。</p><p>おやすみなさい。</p>
