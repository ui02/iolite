                                    <h1></h1>
                    <div class="npf_row"><figure class="tmblr-full" data-orig-height="1707" data-orig-width="1280"><img src="../../media/729620559471820800_0.jpg" data-orig-height="1707" data-orig-width="1280" srcset="../../media/729620559471820800_0.jpg 75w, ../../media/729620559471820800_0.jpg 100w, ../../media/729620559471820800_0.jpg 250w, ../../media/729620559471820800_0.jpg 400w, ../../media/729620559471820800_0.jpg 500w, ../../media/729620559471820800_0.jpg 540w, ../../media/729620559471820800_0.jpg 640w, ../../media/729620559471820800_0.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div><p>人がたくさんいるのが嫌になってしまってから、遊びに出歩くことも億劫になってしまったわたし…🙂けど、やっぱり外に出たら楽しいこともたくさんある。（お母さんありがとう…）</p><p>価値観が変わったなぁとも思うし、前にいいと思ったものは自分の中に強烈に残っていて、いま思い出してもアレはよかったなと。それだけの理由、そこに意識を向けるのって大切だなと思った湯布院のｱﾎﾟｰﾊﾟｲ。</p><p>生活のいろいろ、自分にとっていいバランスが見つかったら、もう少し軽くなるかなぁ。そうだといいな〜。( ˘ω˘)ｽﾔｧ</p><div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729620559471820800_1.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729620559471820800_1.jpg 75w, ../../media/729620559471820800_1.jpg 100w, ../../media/729620559471820800_1.jpg 250w, ../../media/729620559471820800_1.jpg 400w, ../../media/729620559471820800_1.jpg 500w, ../../media/729620559471820800_1.jpg 540w, ../../media/729620559471820800_1.jpg 640w, ../../media/729620559471820800_1.jpg 1280w" sizes="(max-width: 1280px) 100vw, 1280px"/></figure></div><div class="npf_row"><figure class="tmblr-full" data-orig-height="960" data-orig-width="1280"><img src="../../media/729620559471820800_2.jpg" data-orig-height="960" data-orig-width="1280" srcset="../../media/729620559471820800_2.jpg 75w, ../../media/729620559471820800_2.jpg 100w, ../../media/729620559471820800_2.jpg 250w, ../../media/729620559471820800_2.jpg 400w, ../../media/729620559471820800_2.jpg 500w, ../../media/729620559471820800_2.jpg 540w, ../../media/729620559471820800_2.jpg 640w, ../../media/7296205594718
